name: Remote SSH Deployment (Consolidated CI/CD)

on:
  push:
    branches: [ main-prime ]
  pull_request:
    branches: [ main-prime ]

jobs:
  check:
    name: Lint and Build
    runs-on: ubuntu-latest
    
    # This sets the base directory for all 'run' commands in this job
    defaults:
      run:
        working-directory: ./new_site

    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # Add this line to point to the lockfile in your subdirectory
          cache-dependency-path: ./new_site/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

        
  deploy:
    name: Deploy to VPS
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH Key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Navigate to project
            cd /root/inxource_landing_page
            
            # 2. Pull latest code
            git fetch origin main-prime
            git reset --hard origin/main-prime
            
            # 3. Load Node/NVM environment (Ensures pnpm/pm2 are in the PATH)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            #4. Navigate to new_site
            cd new_site
            
            # 5. Install and Build with 4GB RAM limit
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm install -g pnpm
            pnpm install
            pnpm run build
            
            # 6. Restart apps (reload is better than stop/start as it reduces downtime)
            pm2 restart landing-page
            pm2 save
